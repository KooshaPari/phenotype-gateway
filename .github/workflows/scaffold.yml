name: scaffold

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify scaffold layout
        run: |
          test -f docs/SPEC.md
          test -f docs/UPSTREAM.md
          test -d spikes/go
          test -d packages
